x-airflow-common:
  &airflow-common
  image: banking-airflow:custom
  env_file:
    - ${ENV_FILE_PATH:-.env}
  environment:
    &airflow-common-env
    PYTHONPATH: /opt/airflow/src
    # AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER}:${AIRFLOW_POSTGRES_PASSWORD}@airflow-postgres:5432/${AIRFLOW_POSTGRES_DB}
    # AIRFLOW_CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW_CORE__LOAD_EXAMPLES: "false"
    AIRFLOW_CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # AIRFLOW_CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    # AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/api/v2/"
    AIRFLOW_SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    # - ./banking_dbt:/opt/airflow/banking_dbt
    # - ./banking_dbt/.dbt:/home/airflow/.dbt
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - bank-network
  depends_on:
    &airflow-common-depends-on
    airflow-postgres:
      condition: service_healthy

services:
  # This postgres service is for data storage for the ETL and also CDC source for debezium.
  # Airflow will connect to this postgres instance to read/write metadata and also debezium will
  # monitor this postgres instance for changes and stream them to kafka.
  postgres:
    image: postgres:17  # postgres:15
    container_name: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./storage/postgres/data:/var/lib/postgresql/data
      - ./src/sql-ddl:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    command: >
      postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      retries: 5
      start_period: 30s
    networks:
      - bank-network

  kafka:
    image: confluentinc/cp-kafka:8.2.2
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    restart: always
    environment:
      KAFKA_KRAFT_MODE: "true"
      CLUSTER_ID: '1kahd6lkad-WgsT73-66FvaR'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092, CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test:
        - CMD-SHELL
        - kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 30s
      timeout: 30s
      retries: 5
    volumes:
      - kafka-kraft:/var/lib/kafka/data
    networks:
      - bank-network

  debezium:
    image: debezium/connect:3.0.0.Final  # debezium/connect:2.7.3.Final
    container_name: debezium
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
    test:
      - CMD-SHELL
      - curl -f http://localhost:8083/connectors || exit 1
    interval: 15s
    timeout: 10s
    retries: 10
    start_period: 30s
    environment:
      BOOTSTRAP_SERVERS: 'kafka:9092'
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: 'connect_configs'
      OFFSET_STORAGE_TOPIC: 'connect_offsets'
      STATUS_STORAGE_TOPIC: 'connect_status'
      KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'
      KEY_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
      VALUE_CONVERTER: 'org.apache.kafka.connect.json.JsonConverter'
    networks:
      - bank-network
  
  debezium-init:
    image: debezium-init:custom
    container_name: debezium-init
    env_file:
      - .env
    depends_on:
      debezium:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bank-network
    restart: on-failure
  
  # schema-registry:
  #   image: confluentinc/cp-schema-registry:8.2.2
  #   container_name: schema
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     SCHEMA_REGISTRY_KAFKASTORE_CONNECTION_URL:
  #     SCHEMA_REGISTRY_HOST_NAME: schema-registry
  #     SCHEMA_REGISTRY_LISTENERS:
  #   depends_on:
  #     - kafka

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./storage/minio/data:/data
    ports:
      - "9000:9000"
      - "9001:9001"  # Console port
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - bank-network
  
  cdc-consumer:
    image: cdc-consumer:custom
    container_name: cdc-consumer
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      debezium-init:
        condition: service_completed_successfully
    networks:
      - bank-network
    restart: unless-stopped

  airflow-postgres:
    image: postgres:17  # postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - airflow-pg-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Separate from the main postgres to avoid conflicts
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_POSTGRES_USER}", "-d", "${AIRFLOW_POSTGRES_DB}"]
      interval: 5s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - bank-network

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: ["bash", "-c", "airflow db upgrade"]
    environment:
      <<: *airflow-common-env
    networks:
      - bank-network

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - bank-network
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # airflow-dag-processor:
  #   <<: *airflow-common
  #   container_name: airflow-dag-processor
  #   command: dag-processor
  #   healthcheck:
  #     test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s
  #   restart: always
  #   depends_on:
  #     airflow-init:
  #       condition: service_completed_successfully
  
  airflow-create-user:
    <<: *airflow-common
    container_name: airflow-create-user
    command: >
      bash -c "
      airflow users create
      --username ${AIRFLOW_ADMIN_USERNAME}
      --firstname ${AIRFLOW_ADMIN_FIRSTNAME}
      --lastname ${AIRFLOW_ADMIN_LASTNAME}
      --role ${AIRFLOW_ADMIN_ROLE}
      --email ${AIRFLOW_ADMIN_EMAIL}
      --password ${AIRFLOW_ADMIN_PASSWORD}
      "
    depends_on:
      airflow-webserver:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - bank-network
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # airflow-triggerer:
  #   <<: *airflow-common
  #   container_name: airflow-trigger
  #   command: triggerer
  #   healthcheck:
  #     test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s
  #   restart: always
  #   depends_on:
  #     airflow-init:
  #       condition: service_completed_successfully
  
volumes:
  pg-data:
    name: postgres-data
  airflow-pg-data:
    name: airflow-postgres-data
  kafka-kraft:

networks:
  bank-network:
    name: banknetwork